<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>王五导航</title>
</head>
<body>
<script>
const MODES = ['normal', 'webstack', 'easy', 'nav'];
const DEFAULT_MODE = 'normal';

// URL 参数优先
const params = new URLSearchParams(location.search);
const urlMode = params.get('mode');

let mode = MODES.includes(urlMode)
  ? urlMode
  : (localStorage.getItem('navMode') || DEFAULT_MODE);

// 确保合法
if (!MODES.includes(mode)) mode = DEFAULT_MODE;

// webstack 路径特殊
if (mode === 'webstack') {
  location.replace('webstack/index.html');
} else if (mode === 'normal') {
  location.replace('normal/index.html');
} else if (mode === 'easy') {
  location.replace('easy/index.html');
} else if (mode === 'nav') {
  location.replace('nav/index.html');
}
</script>
</body>
</html>
